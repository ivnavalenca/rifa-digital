name: AI Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:

  ai:
    runs-on: ubuntu-latest

    # 🚫 evita loop infinito (quando o próprio bot faz commit)
    if: github.actor != 'github-actions[bot]'

    steps:

      # 📦 Checkout do código
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🐍 Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ⚡ Cache pip (melhora performance)
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      # 📚 Instalar dependências (RAG + IA)
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ======================================
      # 🧠 RAG — BASE DE CONHECIMENTO
      # ======================================
      - name: Build RAG database
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python copilot/ingest.py

      # ======================================
      # 📊 MÉTRICAS
      # ======================================
      - name: Generate engineering metrics
        run: python scripts/generate_metrics.py || true

      - name: Generate quality metrics
        run: python scripts/generate_quality_metrics.py || true

      - name: Generate agile dashboard
        run: python scripts/generate_agile_dashboard.py || true

      # ======================================
      # 🧩 GRAFOS / ARQUITETURA
      # ======================================
      - name: Generate traceability graph
        run: python scripts/generate_traceability_graph.py || true

      - name: Generate knowledge graph
        run: python scripts/generate_knowledge_graph.py || true

      - name: Generate system atlas
        run: python scripts/generate_system_atlas.py || true

      - name: Generate architecture graph
        run: python scripts/generate_architecture_graph.py || true

      # ======================================
      # 🤖 IA (opcional - respostas pré-geradas)
      # ======================================
      - name: Generate AI responses
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/generate_ai_responses.py || true

      # ======================================
      # 💾 COMMIT AUTOMÁTICO
      # ======================================
      - name: Commit generated files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add docs/assets/*.json || true
          git add copilot/db || true

          git commit -m "update: RAG + metrics + dashboards" || echo "No changes"

          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
