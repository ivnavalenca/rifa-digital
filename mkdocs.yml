site_name: Rifa Digital
site_description: Documentação do sistema Rifa Digital
site_author: Ivna Valença de Oliveira
site_url: https://ivnavalenca.github.io/rifa-digital/

repo_url: https://github.com/ivnavalenca/rifa-digital
repo_name: ivnavalenca/rifa-digital

theme:
  name: material
  language: pt-BR
  logo: assets/images/logo.png
  favicon: assets/images/favicon.png

  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Modo escuro

    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Modo claro

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - search.highlight
    - search.share

plugins:
  - search

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

  - pymdownx.details
  - pymdownx.tabbed
  - pymdownx.highlight

  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js

extra:
  mermaid:
    theme: default

nav:
  - Home: index.md

  - Product:
      - Overview: product/README.md
      - Visão do Produto: product/visao-produto.md
      - Roadmap: product/roadmap.md
      - Stakeholders: product/stakeholders.md

  - UX:
      - Overview: ux/README.md
      - Personas: ux/personas.md
      - Jornada do Usuário: ux/jornada-usuario.md
      - Fluxos: ux/sequencia.md

  - Requirements:
      - Overview: requirements/README.md
      - User Stories: requirements/user-stories.md
      - Casos de Uso: requirements/casos-uso.md
      - Rastreabilidade: requirements/rastreabilidade.md

  - Architecture:
      - Overview: architecture/README.md
      - System Overview: architecture/system-overview.md
      - Arquitetura: architecture/arquitetura.md
      - C4 Model: architecture/c4-model.md
      - Modelo de Dados: architecture/data/modelo-dados.md
      - Dicionário de Dados: architecture/data/dicionario-dados.md

  - Process:
      - Processo de Desenvolvimento: process/processo-desenvolvimento.md

  - Testing:
      - Overview: testing/README.md
      - Estratégia de Testes: testing/strategy/estrategia-testes.md
      - Plano de Testes: testing/design/plano-testes.md
      - Pirâmide de Testes: testing/design/test-pyramid.md
      - Casos de Teste: testing/cases/
      - Rastreabilidade: testing/traceability/matriz-rastreabilidade-testes.md

  - User:
      - Manual do Usuário: user/manual-usuario.md
