site_name: Rifa Digital
site_description: Portal de Engenharia de Software com IA
site_author: Ivna Valença de Oliveira
site_url: https://ivnavalenca.github.io/rifa-digital/

repo_url: https://github.com/ivnavalenca/rifa-digital
repo_name: rifa-digital

theme:
  name: material
  language: pt-BR
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.tabs.link

nav:

  - Home: index.md

  # =========================
  # 📊 AGILE
  # =========================
  - Agile:
      - Overview: agile/index.md
      - Agile Dashboard: agile/agile-dashboard.md

  # =========================
  # 🧠 ENGINEERING
  # =========================
  - Engineering:
      - Engineering Map: engineering/engineering-map.md
      - Knowledge Graph: engineering/knowledge-graph.md
      - Traceability Graph: engineering/traceability-graph.md
      - Architecture Explorer: engineering/architecture-explorer.md
      - System Atlas: engineering/system-atlas.md
      - Interactive System Map: engineering/system-map.md
      - 3D Architecture Map: engineering/system-map-3d.md
      - AI Engineering Assistant: engineering/assistant.md

  # =========================
  # 🗄️ DATA ARCHITECTURE
  # =========================
  - Data Architecture:
      - Overview: data-architecture/index.md
      - Data Model Evolution: data-architecture/data-model-evolution.md
      - Database Design: data-architecture/database-design.md
      - Data Dictionary: data-architecture/dicionario-dados.md
      - Relational Model: data-architecture/modelo-relacional.md
      - SQL Schema: data-architecture/schema-sql.md

  # =========================
  # 🧪 QUALITY (TESTES INTEGRADOS)
  # =========================
  - Quality:
      - Overview: quality/index.md

      - Strategy:
          - Plano de Testes: quality/strategy/plano-testes.md
          - Estratégia de Testes: quality/strategy/estrategia-testes.md
          - Test Pyramid: quality/strategy/test-pyramid.md

      - Design:
          - Casos de Teste: quality/design/casos-de-teste.md
          - BDD Scenarios: quality/design/bdd-scenarios.md
          - Test Data: quality/design/test-data.md

      - Execution:
          - Quality Dashboard: quality/execution/quality-dashboard.md
          - Test Execution Report: quality/execution/test-execution-report.md

      - Traceability:
          - Matriz de Rastreabilidade: quality/traceability/matriz-rastreabilidade-testes.md

      - Process:
          - Plano de Qualidade: quality/process/plano-qualidade.md

  # =========================
  # 🤖 AI
  # =========================
  - AI:
      - Assistant: assistant.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - fenced_code
  - md_in_html

extra_javascript:
  - javascripts/quality.js
  - javascripts/metrics.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ivnavalenca
